services:
  grafana:
    container_name: ctr-grafana
    image: grafana/grafana-enterprise
    restart: unless-stopped
    env_file: .env
    user: root
    #ports:
    #  - "3000:3000"
    volumes:
      - ./data:/var/lib/grafana
    networks:
      grafana:
        ipv4_address: 10.1.19.2

  prometheus:
    container_name: ctr-grafana-prometheus
    image: prom/prometheus
    restart: unless-stopped
    user: root
    #ports:
    #  - "9090:9090"
    volumes:
      - ./prometheus:/prometheus
      - ./config:/etc/prometheus/
    networks:
      grafana:
        ipv4_address: 10.1.19.3

  node-exporter:
    image: prom/node-exporter
    #ports:
    #  - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      grafana:
        ipv4_address: 10.1.19.4

  cadvisor:
    image: gcr.io/cadvisor/cadvisor
    #ports:
    #  - "127.0.0.1:8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      grafana:
        ipv4_address: 10.1.19.5

networks:
  grafana:
    name: net-grafana
    driver: bridge
    ipam:
     config:
       - subnet: 10.1.19.0/24
         gateway: 10.1.19.1